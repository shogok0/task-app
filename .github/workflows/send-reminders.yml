name: Send Deadline Reminders

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call reminder endpoint
        env:
          REMINDER_ENDPOINT: ${{ secrets.REMINDER_ENDPOINT }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$REMINDER_ENDPOINT" ] || [ -z "$CRON_SECRET" ]; then
            echo "Missing required secrets: REMINDER_ENDPOINT or CRON_SECRET"
            exit 1
          fi

          for attempt in 1 2 3; do
            code=$(curl -sS -o response.txt -w "%{http_code}" -X POST "$REMINDER_ENDPOINT" \
              -H "X-Cron-Token: $CRON_SECRET" \
              -H "Content-Type: application/json")

            echo "Attempt $attempt -> HTTP $code"
            cat response.txt || true
            echo

            if [ "$code" = "200" ]; then
              exit 0
            fi

            if [ "$code" = "500" ] && [ "$attempt" != "3" ]; then
              sleep 15
              continue
            fi

            exit 1
          done
