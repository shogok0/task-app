<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>課題管理</title>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#2563eb">

<style>

body{
font-family: Arial;
background:#f3f4f6;
padding:20px;
}

.container{
max-width:400px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h1{
text-align:center;
}

input{
width:100%;
padding:10px;
margin:5px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.task{
background:#f9fafb;
padding:10px;
margin-top:8px;
border-radius:6px;
}

.delete{
margin-top:5px;
background:#ef4444;
}

.done{
margin-top:5px;
background:#16a34a;
}

</style>

</head>

<body>

<div class="container">

<h1>課題管理</h1>

<form action="/add" method="post">

<input name="task" placeholder="課題名" required>

<input name="deadline" type="date">

<button type="submit">追加</button>

</form>

<h2>課題一覧</h2>

{% for task in tasks %}

<div class="task">

{% if task.done %}
<del>{{task.task}}</del>
{% else %}
<b>{{task.task}}</b>
{% endif %}

<br>
締切: {{task.deadline}}<br>

{% if task.days_left != "" %}
あと {{task.days_left}} 日
{% endif %}

<form action="/toggle/{{task.id}}" method="post">
<button class="done">
{% if task.done %}
未提出に戻す
{% else %}
提出済み
{% endif %}
</button>
</form>

<form action="/delete/{{task.id}}" method="post">
<button class="delete">
削除
</button>
</form>

</div>

{% endfor %}

</div>

</body>
</html>
