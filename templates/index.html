<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>課題管理</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<link rel="apple-touch-icon" href="/icon.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">



<style>

body{
font-family: Arial;
background:#f1f5f9;
padding:30px;
transition:0.3s;
}

.dark{
background:#0f172a;
color:white;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:25px;
border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.dark .container{
background:#1e293b;
}

input{
width:100%;
padding:12px;
margin:6px 0;
border-radius:8px;
border:1px solid #e2e8f0;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
margin-top:6px;
cursor:pointer;
}

.task{
padding:12px;
margin-top:10px;
border-radius:10px;
background:#f8fafc;
}

.dark .task{
background:#334155;
}

.subject{
font-size:12px;
background:#e0e7ff;
padding:3px 6px;
border-radius:6px;
display:inline-block;
margin-bottom:5px;
}

.red{
background:#fee2e2;
border-left:5px solid #ef4444;
}

.orange{
background:#ffedd5;
border-left:5px solid #f97316;
}

.normal{
background:#f8fafc;
}

#calendar{
margin-top:20px;
background:white;
padding:10px;
border-radius:10px;
}

</style>


</head>

<body>

<div class="container">

<h1>課題管理</h1>

<button onclick="toggleDark()">ダークモード</button>

<input id="search" placeholder="課題検索" onkeyup="filterTasks()">

<input id="subjectFilter" placeholder="科目フィルター" onkeyup="filterTasks()">

<form action="/add" method="post">

<input name="subject" placeholder="科目" required>

<input name="task" placeholder="課題名" required>

<input name="deadline" type="date">

<button type="submit">追加</button>

</form>

<h2>締切カレンダー</h2>

<div id="calendar"></div>

<div id="tasks">

{% for task in tasks %}

<div class="task 
{% if task.days_left != None and task.days_left <= 0 %}
red
{% elif task.days_left != None and task.days_left <= 3 %}
orange
{% else %}
normal
{% endif %}
">

<div class="subject">{{task.subject}}</div>

{% if task.done %}
<del class="taskname">{{task.task}}</del>
{% else %}
<b class="taskname">{{task.task}}</b>
{% endif %}

<br>

締切: {{task.deadline}}

{% if task.days_left != None %}
<br>あと {{task.days_left}} 日
{% endif %}

<form action="/toggle/{{task.id}}" method="post">
<button>
{% if task.done %}
未提出に戻す
{% else %}
提出済み
{% endif %}
</button>
</form>

<form action="/delete/{{task.id}}" method="post">
<button style="background:#ef4444">削除</button>
</form>

</div>

{% endfor %}

</div>

</div>

<script>

function toggleDark(){
document.body.classList.toggle("dark")
}

function filterTasks(){

let search=document.getElementById("search").value.toLowerCase()
let subject=document.getElementById("subjectFilter").value.toLowerCase()

let tasks=document.querySelectorAll(".task")

tasks.forEach(task=>{

let name=task.querySelector(".taskname").innerText.toLowerCase()
let sub=task.querySelector(".subject").innerText.toLowerCase()

if(name.includes(search)&&sub.includes(subject)){
task.style.display="block"
}else{
task.style.display="none"
}

})

}

</script>

<script>

document.addEventListener('DOMContentLoaded', function() {

let events = [

{% for task in tasks %}
{
title: "{{task.subject}} {{task.task}}",
start: "{{task.deadline}}"
},
{% endfor %}

]

let calendarEl = document.getElementById('calendar')

let calendar = new FullCalendar.Calendar(calendarEl, {

initialView: 'dayGridMonth',

events: events

})

calendar.render()

})

</script>

</body>
</html>
