<!DOCTYPE html>
<html>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>課題管理</title>

<style>

body{
font-family:Arial;
background:#f1f5f9;
margin:0;
}

.container{
max-width:600px;
margin:auto;
padding:20px;
}

input,button{
width:100%;
padding:14px;
margin-top:8px;
border-radius:8px;
border:1px solid #ddd;
font-size:16px;
}

button{
background:#2563eb;
color:white;
border:none;
}

.task{
background:white;
padding:14px;
margin-top:10px;
border-radius:10px;
}

.done{
background:#dbeafe;
border-left:5px solid #2563eb;
}

.done{
background:#dbeafe;
border-left:5px solid #2563eb;
}

.warning{
background:#ffedd5;
border-left:5px solid #f97316;
}

.danger{
background:#fee2e2;
border-left:5px solid #ef4444;
}

#calendar{
margin-top:20px;
background:white;
padding:10px;
border-radius:10px;
}

label{
display:block;
margin-top:10px;
font-weight:bold;
}

input[type="date"]{
background:white;
}

.add-btn{
margin-top:15px;
padding:16px;
font-size:18px;
font-weight:bold;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
}

.add-btn:active{
background:#1d4ed8;
}

.date-box{
position:relative;
}

.date-placeholder{
position:absolute;
left:12px;
top:50%;
transform:translateY(-50%);
color:#888;
pointer-events:none;
}

input[type="date"]{
background:white;
}

</style>

</head>

<script>

document.addEventListener('DOMContentLoaded', function() {

let events = [

{% for task in tasks %}
{
title: "{{task.subject}} {{task.task}}",
start: "{{task.deadline}}"
},
{% endfor %}

]

let calendarEl = document.getElementById('calendar')

let calendar = new FullCalendar.Calendar(calendarEl, {

initialView: 'dayGridMonth',

events: events

})

calendar.render()

})

</script>

<script>

let dateInput=document.getElementById("deadline")
let placeholder=document.querySelector(".date-placeholder")

dateInput.addEventListener("change",function(){

if(dateInput.value){
placeholder.style.display="none"
}

})

</script>

<body>

<div class="container">

<h1>課題管理</h1>

<a href="/logout">ログアウト</a>

<form action="/add" method="post">

<input name="subject" placeholder="📚 科目">

<input name="task" placeholder="📝 課題">

<label for="deadline">📅 締切日</label>
<div class="date-box">
<input id="deadline" name="deadline" type="date">
<span class="date-placeholder">日付選択</span>
</div>

<button class="add-btn" type="submit">＋ 課題追加</button>

</form>

<h2>締切カレンダー</h2>
<div id="calendar"></div>

{% for task in tasks %}

<div class="task 
{% if task.done %}
done
{% elif task.days_left != None and task.days_left <= 1 %}
danger
{% elif task.days_left != None and task.days_left <= 3 %}
warning
{% endif %}
">

<b>{{task.subject}}</b><br>
{{task.task}}<br>
締切 {{task.deadline}}

{% if task.days_left != None %}
<br>あと {{task.days_left}} 日
{% endif %}

<form action="/toggle/{{task.id}}" method="post">

<button>
{% if task.done %}
未提出に戻す
{% else %}
提出済み
{% endif %}
</button>

</form>

<form action="/delete/{{task.id}}" method="post">
<button style="background:red">削除</button>
</form>

</div>

{% endfor %}

</div>

</body>
</html>
