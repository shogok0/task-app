<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>課題管理</title>

<style>

body{
font-family:Arial;
background:#f1f5f9;
margin:0;
}

.container{
max-width:600px;
margin:auto;
padding:20px;
}

input,button{
width:100%;
padding:14px;
margin-top:8px;
border-radius:8px;
border:1px solid #ddd;
font-size:16px;
}

button{
background:#2563eb;
color:white;
border:none;
}

.task{
background:white;
padding:14px;
margin-top:10px;
border-radius:10px;
}

.done{
background:#dbeafe;
border-left:5px solid #2563eb;
}

</style>

</head>

<body>

<div class="container">

<h1>課題管理</h1>

<a href="/logout">ログアウト</a>

<form action="/add" method="post">

<input name="subject" placeholder="科目">

<input name="task" placeholder="課題">

<input name="deadline" type="date">

<button type="submit">追加</button>

</form>

{% for task in tasks %}

<div class="task {% if task.done %}done{% endif %}">

<b>{{task.subject}}</b><br>
{{task.task}}<br>
締切 {{task.deadline}}

<form action="/toggle/{{task.id}}" method="post">

<button>
{% if task.done %}
未提出に戻す
{% else %}
提出済み
{% endif %}
</button>

</form>

<form action="/delete/{{task.id}}" method="post">
<button style="background:red">削除</button>
</form>

</div>

{% endfor %}

</div>

</body>
</html>
