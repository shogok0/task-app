<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>課題管理</title>

<style>

body{
font-family: Arial;
background:#f3f4f6;
padding:20px;
}

.container{
max-width:400px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin:5px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
margin-top:5px;
}

.delete{
background:#ef4444;
}

.done{
background:#16a34a;
}

.task{
padding:10px;
margin-top:10px;
border-radius:6px;
}

.red{
background:#fee2e2;
}

.orange{
background:#ffedd5;
}

.normal{
background:#f9fafb;
}

</style>

</head>

<body>

<div class="container">

<h1>課題管理</h1>

<form action="/add" method="post">

<input name="subject" placeholder="科目" required>

<input name="task" placeholder="課題名" required>

<input name="deadline" type="date">

<button type="submit">追加</button>

</form>


{% for task in tasks %}

<div class="task 
{% if task.days_left != None and task.days_left <= 0 %}
red
{% elif task.days_left != None and task.days_left <= 3 %}
orange
{% else %}
normal
{% endif %}
">

<b>{{task.subject}}</b><br>

{% if task.done %}
<del>{{task.task}}</del>
{% else %}
{{task.task}}
{% endif %}

<br>

締切: {{task.deadline}}

{% if task.days_left != None %}
<br>あと {{task.days_left}} 日
{% endif %}


<form action="/toggle/{{task.id}}" method="post">
<button class="done">
{% if task.done %}
未提出に戻す
{% else %}
提出済み
{% endif %}
</button>
</form>


<form action="/delete/{{task.id}}" method="post">
<button class="delete">
削除
</button>
</form>

</div>

{% endfor %}

</div>

</body>
</html>
