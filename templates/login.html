<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ログイン</title>
<style>
body{font-family:Arial;background:#f1f5f9;margin:0;}
.container{max-width:400px;margin:auto;padding:20px;}
input,button{width:100%;padding:14px;margin-top:8px;border-radius:8px;border:1px solid #ddd;font-size:16px;}
button{background:#2563eb;color:white;border:none;}
.error{color:red;}
</style>
</head>
<body>
<div class="container">
<h2>ログイン</h2>
{% if error %}<p class="error">{{error}}</p>{% endif %}
<form action="/login" method="post">
<input name="username" placeholder="ユーザー名" required>
<input name="password" type="password" placeholder="パスワード" required>
<button type="submit">ログイン</button>
</form>

<h2>新規登録</h2>
<form action="/register" method="post">
<input name="username" placeholder="ユーザー名" required>
<input name="password" type="password" placeholder="パスワード" required>
<input name="email" type="email" placeholder="メールアドレス（通知に使用・任意）">
<button type="submit">登録</button>
</form>
</div>
</body>
</html>
